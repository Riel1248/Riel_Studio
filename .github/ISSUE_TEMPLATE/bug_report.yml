name: "\U0001F41B Bug Report"
description: "Something isn't working as expected."
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug clearly and briefly.
      placeholder: "e.g. When I connect a ControlNet node and press Generate, nothing happens."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What steps can we follow to see the same issue?
      placeholder: |
        1. Open Blender and go to Riel Studio panel
        2. Load workflow X
        3. Click Generate
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "e.g. The image should generate and appear in the viewport."
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: "e.g. Nothing happened, and the console showed an error."
    validations:
      required: false

  - type: input
    id: riel-version
    attributes:
      label: Riel Studio version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: blender-version
    attributes:
      label: Blender version
      placeholder: "e.g. 4.4.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU (optional)
      placeholder: "e.g. NVIDIA RTX 4090"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: If applicable, attach screenshots or a short video that shows the issue. You can drag and drop files here.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error logs (optional)
      description: If you see any error messages in Blender's console or ComfyUI's console, paste them here.
      render: shell
    validations:
      required: false